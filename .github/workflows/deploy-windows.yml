name: deploy-windows

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  publish-and-deploy:
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore HelloTesting.sln

      - name: Build
        run: dotnet build HelloTesting.sln --configuration Release --no-restore

      - name: Publish win-x64 single-file
        run: dotnet publish src/HelloTesting/HelloTesting.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/win-x64

      - name: Ensure target directory exists
        shell: pwsh
        env:
          WINDOWS_TARGET_PATH: ${{ secrets.WINDOWS_TARGET_PATH }}
        run: |
          New-Item -ItemType Directory -Force -Path "$env:WINDOWS_TARGET_PATH" | Out-Null

      - name: Replace deployment
        shell: pwsh
        env:
          WINDOWS_TARGET_PATH: ${{ secrets.WINDOWS_TARGET_PATH }}
        run: |
          $target = $env:WINDOWS_TARGET_PATH
          $staging = Join-Path $target '_staging'

          if (Test-Path $staging) {
            Remove-Item -Recurse -Force $staging
          }

          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item -Path "publish/win-x64/*" -Destination $staging -Recurse -Force

          Get-ChildItem -Path $target -Force |
            Where-Object { $_.Name -ne '_staging' } |
            Remove-Item -Recurse -Force

          Get-ChildItem -Path $staging -Force | ForEach-Object {
            Move-Item -Force $_.FullName $target
          }

          Remove-Item -Recurse -Force $staging
