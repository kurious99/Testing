name: deploy-windows

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore HelloTesting.sln

      - name: Build
        run: dotnet build HelloTesting.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/HelloTesting/HelloTesting.csproj -c Release -o publish

      - name: Replace deployment folder
        shell: pwsh
        env:
          DEPLOY_TARGET_PATH: ${{ secrets.DEPLOY_TARGET_PATH }}
        run: |
          $target = $env:DEPLOY_TARGET_PATH
          $publish = Join-Path $PWD "publish"
          $staging = Join-Path $target "_staging"

          New-Item -ItemType Directory -Force -Path $target | Out-Null

          if (Test-Path $staging) {
            Remove-Item -Recurse -Force $staging
          }

          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item -Path "$publish\\*" -Destination $staging -Recurse -Force

          Get-ChildItem -Path $target -Force |
            Where-Object { $_.Name -ne '_staging' } |
            Remove-Item -Recurse -Force

          Get-ChildItem -Path $staging -Force | ForEach-Object {
            Move-Item -Path $_.FullName -Destination $target -Force
          }

          Remove-Item -Recurse -Force $staging
