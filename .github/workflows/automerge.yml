name: Auto review and merge

on:
  pull_request:
    types: [labeled, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  status: {}

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

jobs:
  automerge:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Merge labeled PRs when checks pass
        id: automerge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            async function getPullNumber() {
              if (context.payload.pull_request?.number) return context.payload.pull_request.number;
              if (context.payload.check_suite?.pull_requests?.length) return context.payload.check_suite.pull_requests[0].number;
              return null;
            }

            const pull_number = await getPullNumber();
            if (!pull_number) {
              core.info('No PR associated with this event.');
              core.setOutput('telegram_message', '');
              return;
            }

            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number });
            const labels = (pr.labels || []).map(l => l.name);
            const action = context.payload.action || '';
            const addedLabel = context.payload.label?.name || '';

            if (!labels.includes('automerge')) {
              core.info('PR missing automerge label; skipping.');
              core.setOutput('telegram_message', '');
              return;
            }

            if (action === 'labeled' && addedLabel && addedLabel !== 'automerge') {
              core.info(`Ignoring unrelated label event: ${addedLabel}`);
              core.setOutput('telegram_message', '');
              return;
            }

            if (pr.draft) {
              core.info('PR is draft; skipping.');
              core.setOutput('telegram_message', '');
              return;
            }

            if (pr.mergeable_state === 'dirty') {
              core.setOutput('telegram_message', `⚠️ PR #${pull_number} merge blocked\nTitle: ${pr.title}\nReason: merge conflicts\nLink: ${pr.html_url}`);
              core.setFailed('PR has merge conflicts.');
              return;
            }

            const { data: combined } = await github.rest.repos.getCombinedStatusForRef({
              owner,
              repo,
              ref: pr.head.sha,
            });
            if (combined.state && combined.state !== 'success') {
              core.info(`Combined status is ${combined.state}; waiting.`);
              core.setOutput('telegram_message', '');
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner,
                repo,
                pull_number,
                merge_method: 'squash',
              });
              core.setOutput('telegram_message', `✅ PR #${pull_number} merged automatically\nTitle: ${pr.title}\nMethod: squash\nLink: ${pr.html_url}`);
              core.info(`Merged PR #${pull_number}`);
            } catch (e) {
              core.setOutput('telegram_message', `⚠️ PR #${pull_number} merge failed\nTitle: ${pr.title}\nReason: ${e.message}\nLink: ${pr.html_url}`);
              core.setFailed(`Failed to merge PR: ${e.message}`);
            }

      - name: Send Telegram merge summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.automerge.outputs.telegram_message }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          msg = os.environ.get('MESSAGE', '').strip()
          if not msg:
              raise SystemExit(0)
          url = f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage"
          payload = json.dumps({'chat_id': os.environ['TELEGRAM_CHAT_ID'], 'text': msg}).encode()
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          PY
