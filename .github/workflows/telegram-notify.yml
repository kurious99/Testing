name: Telegram PR notify

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed, labeled]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Build message
        id: build
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput('skip', 'true');
              return;
            }

            const action = context.payload.action;
            const labels = (pr.labels || []).map(l => l.name);
            const hasAutomerge = labels.includes('automerge');
            let emoji = '🔔';
            let headline = `PR #${pr.number} updated`;
            let details = [];

            if (context.eventName === 'pull_request_review' && context.payload.review) {
              const reviewState = context.payload.review.state;
              emoji = reviewState === 'approved' ? '✅' : reviewState === 'changes_requested' ? '⚠️' : '💬';
              headline = `PR #${pr.number} review: ${reviewState}`;
              details.push(`Title: ${pr.title}`);
            } else if (action === 'opened') {
              emoji = '🆕';
              headline = `PR #${pr.number} opened`;
            } else if (action === 'synchronize') {
              emoji = '🔄';
              headline = `PR #${pr.number} updated with new commits`;
            } else if (action === 'ready_for_review') {
              emoji = '👀';
              headline = `PR #${pr.number} ready for review`;
            } else if (action === 'reopened') {
              emoji = '♻️';
              headline = `PR #${pr.number} reopened`;
            } else if (action === 'labeled' && context.payload.label?.name === 'automerge') {
              emoji = '🤖';
              headline = `PR #${pr.number} automerge enabled`;
            } else if (action === 'closed' && pr.merged) {
              emoji = '✅';
              headline = `PR #${pr.number} merged`;
            } else if (action === 'closed') {
              emoji = '❌';
              headline = `PR #${pr.number} closed`;
            }

            details.push(`Title: ${pr.title}`);
            details.push(`State: ${pr.state}${pr.merged ? ' (merged)' : ''}`);
            if (hasAutomerge) details.push(`Labels: ${labels.join(', ')}`);
            details.push(`Link: ${pr.html_url}`);

            const message = [
              `${emoji} ${headline}`,
              ...details,
            ].join('\n');

            core.setOutput('message', message);

      - name: Send Telegram message
        if: steps.build.outputs.skip != 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.build.outputs.message }}
        run: |
          python3 - <<'PY'
import json, os, urllib.request
url = f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage"
payload = json.dumps({
  'chat_id': os.environ['TELEGRAM_CHAT_ID'],
  'text': os.environ['MESSAGE'],
}).encode()
req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
with urllib.request.urlopen(req) as r:
    print(r.read().decode())
PY
