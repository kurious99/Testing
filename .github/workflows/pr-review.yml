name: PR review gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI review PR diff
        id: review
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const pr = context.payload.pull_request;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const count = files.length;
            const additions = files.reduce((a, f) => a + (f.additions || 0), 0);
            const deletions = files.reduce((a, f) => a + (f.deletions || 0), 0);
            const names = files.map(f => `- ${f.filename}`).join('\n');

            const compactFiles = files.map(f => ({
              filename: f.filename,
              status: f.status,
              additions: f.additions,
              deletions: f.deletions,
              patch: f.patch || ''
            }));

            let verdict = 'MANUAL_REVIEW';
            let summary = 'AI review did not run.';
            let confidence = 'low';
            let blockingIssues = [];
            let nonBlockingSuggestions = [];
            let reasons = ['OPENAI_API_KEY secret is missing.'];

            if (process.env.OPENAI_API_KEY) {
              const model = process.env.OPENAI_MODEL || 'gpt-4o-mini';
              const prompt = [
                'You are an experienced senior software engineer reviewing a GitHub pull request.',
                'Review the diff like a careful human reviewer.',
                'Focus on correctness, maintainability, dead code, placeholder logic, API design, naming, null safety, suspicious logic, and unnecessary complexity.',
                'Be strict but fair. Do not invent issues if the code is acceptable.',
                'Distinguish between blocking problems and non-blocking suggestions.',
                'Small issues like an unused variable, naming nit, or cleanup suggestion should usually NOT produce REQUEST_CHANGES by themselves.',
                'Use REQUEST_CHANGES only for likely bugs, broken behavior, dangerous logic, dead code that clearly should not ship, incorrect API contracts, or seriously poor implementation.',
                'Use MANUAL_REVIEW for low-confidence review, very large diffs, very sensitive changes, or ambiguous risky cases.',
                'Use PASS when the code is acceptable, even if there are small non-blocking suggestions.',
                'Assign a severity for each issue: CRITICAL, HIGH, MEDIUM, LOW, or INFO.',
                'Return ONLY valid JSON with this exact schema:',
                '{"verdict":"PASS|REQUEST_CHANGES|MANUAL_REVIEW","summary":"string","confidence":"high|medium|low","reasons":["string"],"blockingIssues":[{"severity":"CRITICAL|HIGH|MEDIUM|LOW|INFO","file":"string","title":"string","details":"string"}],"nonBlockingSuggestions":[{"severity":"CRITICAL|HIGH|MEDIUM|LOW|INFO","file":"string","title":"string","details":"string"}]}',
                '',
                `PR title: ${pr.title}`,
                `PR body: ${pr.body || ''}`,
                `Files changed: ${count}`,
                `Diff size: +${additions} / -${deletions}`,
                'Changed files and patches:',
                JSON.stringify(compactFiles)
              ].join('\n');

              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                },
                body: JSON.stringify({
                  model,
                  temperature: 0.1,
                  response_format: { type: 'json_object' },
                  messages: [
                    { role: 'system', content: 'You are a concise and accurate pull request reviewer.' },
                    { role: 'user', content: prompt }
                  ]
                })
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`OpenAI API error ${response.status}: ${text}`);
              }

              const data = await response.json();
              const content = data.choices?.[0]?.message?.content || '{}';
              const parsed = JSON.parse(content);

              verdict = ['PASS', 'REQUEST_CHANGES', 'MANUAL_REVIEW'].includes(parsed.verdict) ? parsed.verdict : 'MANUAL_REVIEW';
              confidence = ['high', 'medium', 'low'].includes(parsed.confidence) ? parsed.confidence : 'low';
              summary = parsed.summary || 'No summary provided.';
              reasons = Array.isArray(parsed.reasons) ? parsed.reasons : [];
              blockingIssues = Array.isArray(parsed.blockingIssues) ? parsed.blockingIssues : [];
              nonBlockingSuggestions = Array.isArray(parsed.nonBlockingSuggestions) ? parsed.nonBlockingSuggestions : [];

              const severityRank = { INFO: 1, LOW: 2, MEDIUM: 3, HIGH: 4, CRITICAL: 5 };
              const normalizedBlocking = [];
              const downgradedSuggestions = [];

              for (const issue of blockingIssues) {
                const sev = String(issue.severity || 'INFO').toUpperCase();
                if (sev === 'HIGH' || sev === 'CRITICAL') {
                  normalizedBlocking.push({ ...issue, severity: sev });
                } else {
                  downgradedSuggestions.push({ ...issue, severity: sev, details: `${issue.details || 'No details provided.'} (Auto-downgraded from blocking by workflow policy.)` });
                }
              }

              blockingIssues = normalizedBlocking;
              nonBlockingSuggestions = [...nonBlockingSuggestions, ...downgradedSuggestions];

              const highestBlockingSeverity = blockingIssues.reduce((max, issue) => {
                const sev = String(issue.severity || 'INFO').toUpperCase();
                return Math.max(max, severityRank[sev] || 0);
              }, 0);

              const hasMediumSuggestion = nonBlockingSuggestions.some(issue => String(issue.severity || 'INFO').toUpperCase() === 'MEDIUM');

              if (highestBlockingSeverity >= severityRank.HIGH) {
                verdict = 'REQUEST_CHANGES';
              } else if (hasMediumSuggestion || verdict === 'MANUAL_REVIEW') {
                verdict = 'MANUAL_REVIEW';
              } else {
                verdict = 'PASS';
              }

              if (verdict === 'REQUEST_CHANGES' && blockingIssues.length === 0) {
                verdict = 'MANUAL_REVIEW';
                reasons.push('AI returned REQUEST_CHANGES without high-severity blocking issues, so this was downgraded to MANUAL_REVIEW.');
              }
            }

            const formatIssues = (items) => {
              if (!items.length) return '- None';
              return items.map(item => {
                const sev = item.severity || 'INFO';
                const file = item.file || 'unknown';
                const title = item.title || 'Untitled issue';
                const details = item.details || 'No details provided.';
                return `- [${sev}] ${file} — ${title}: ${details}`;
              }).join('\n');
            };

            const body = [
              '## AI PR review',
              '',
              `**Verdict:** ${verdict}`,
              `**Confidence:** ${confidence}`,
              `**Summary:** ${summary}`,
              `**Files changed:** ${count}`,
              `**Diff size:** +${additions} / -${deletions}`,
              '',
              reasons.length ? `**Reasons:**\n${reasons.map(r => `- ${r}`).join('\n')}` : '**Reasons:**\n- None',
              '',
              '**Blocking issues:**',
              formatIssues(blockingIssues),
              '',
              '**Non-blocking suggestions:**',
              formatIssues(nonBlockingSuggestions),
              '',
              '**Changed files:**',
              names || '- None'
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });

            core.setOutput('telegram_message', [
              `${verdict === 'PASS' ? '🤖' : verdict === 'MANUAL_REVIEW' ? '🟡' : '⚠️'} PR #${pull_number} AI review: ${verdict}`,
              `Title: ${pr.title}`,
              `Confidence: ${confidence}`,
              `Summary: ${summary}`,
              `Files changed: ${count}`,
              `Diff size: +${additions} / -${deletions}`,
              `Reasons: ${reasons.length ? reasons.join('; ') : 'None'}`,
              `Blocking issues: ${blockingIssues.length}`,
              `Non-blocking suggestions: ${nonBlockingSuggestions.length}`,
              `Changed files:\n${names || '- None'}`,
              `Link: ${pr.html_url}`,
            ].join('\n'));

            if (verdict === 'PASS') {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['automerge'] });
            } else if (verdict === 'REQUEST_CHANGES') {
              core.setFailed(`Review blocked: ${reasons.join('; ') || summary || 'blocking issues found'}`);
            } else {
              core.warning(`Manual review requested: ${reasons.join('; ') || summary || 'manual review required'}`);
            }

      - name: Send Telegram review summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.review.outputs.telegram_message }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          msg = os.environ.get('MESSAGE', '').strip()
          if not msg:
              raise SystemExit(0)
          url = f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage"
          payload = json.dumps({'chat_id': os.environ['TELEGRAM_CHAT_ID'], 'text': msg}).encode()
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          PY
