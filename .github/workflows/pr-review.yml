name: PR review gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI review PR diff
        id: review
        uses: actions/github-script@v7
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;
            const pr = context.payload.pull_request;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const count = files.length;
            const additions = files.reduce((a, f) => a + (f.additions || 0), 0);
            const deletions = files.reduce((a, f) => a + (f.deletions || 0), 0);
            const names = files.map(f => `- ${f.filename}`).join('\n');

            const compactFiles = files.map(f => ({
              filename: f.filename,
              status: f.status,
              additions: f.additions,
              deletions: f.deletions,
              patch: f.patch || ''
            }));

            let verdict = 'MANUAL_REVIEW';
            let summary = 'AI review did not run.';
            let reasons = ['OPENAI_API_KEY secret is missing.'];
            let findings = [];

            if (process.env.OPENAI_API_KEY) {
              const model = process.env.OPENAI_MODEL || 'gpt-4o-mini';
              const prompt = [
                'You are an experienced senior software engineer reviewing a GitHub pull request.',
                'Review the diff like a human reviewer.',
                'Focus on correctness, code smell, maintainability, API design, null safety, dead code, suspicious logic, and unnecessary complexity.',
                'Be strict but fair. Do not invent issues if the code is fine.',
                'Return ONLY valid JSON with this exact schema:',
                '{"verdict":"PASS|REQUEST_CHANGES|MANUAL_REVIEW","summary":"string","reasons":["string"],"findings":["string"]}',
                'Use REQUEST_CHANGES when there is a likely bug, dead code, placeholder logic, broken API contract, or clearly poor implementation.',
                'Use MANUAL_REVIEW when the diff is too large, too sensitive, or confidence is low.',
                'Use PASS when the change looks acceptable.',
                '',
                `PR title: ${pr.title}`,
                `PR body: ${pr.body || ''}`,
                `Files changed: ${count}`,
                `Diff size: +${additions} / -${deletions}`,
                'Changed files and patches:',
                JSON.stringify(compactFiles)
              ].join('\n');

              const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.OPENAI_API_KEY}`,
                },
                body: JSON.stringify({
                  model,
                  temperature: 0.1,
                  messages: [
                    { role: 'system', content: 'You are a concise and accurate pull request reviewer.' },
                    { role: 'user', content: prompt }
                  ]
                })
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`OpenAI API error ${response.status}: ${text}`);
              }

              const data = await response.json();
              const content = data.choices?.[0]?.message?.content || '{}';
              const parsed = JSON.parse(content);

              verdict = ['PASS', 'REQUEST_CHANGES', 'MANUAL_REVIEW'].includes(parsed.verdict) ? parsed.verdict : 'MANUAL_REVIEW';
              summary = parsed.summary || 'No summary provided.';
              reasons = Array.isArray(parsed.reasons) ? parsed.reasons : [];
              findings = Array.isArray(parsed.findings) ? parsed.findings : [];
            }

            const body = [
              '## AI PR review',
              '',
              `**Verdict:** ${verdict}`,
              `**Summary:** ${summary}`,
              `**Files changed:** ${count}`,
              `**Diff size:** +${additions} / -${deletions}`,
              '',
              reasons.length ? `**Reasons:**\n${reasons.map(r => `- ${r}`).join('\n')}` : '**Reasons:**\n- None',
              '',
              findings.length ? `**Findings:**\n${findings.map(f => `- ${f}`).join('\n')}` : '**Findings:**\n- No notable findings',
              '',
              '**Changed files:**',
              names || '- None'
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });

            core.setOutput('telegram_message', [
              `${verdict === 'PASS' ? '🤖' : '⚠️'} PR #${pull_number} AI review: ${verdict}`,
              `Title: ${pr.title}`,
              `Summary: ${summary}`,
              `Files changed: ${count}`,
              `Diff size: +${additions} / -${deletions}`,
              `Reasons: ${reasons.length ? reasons.join('; ') : 'None'}`,
              `Findings: ${findings.length ? findings.join('; ') : 'No notable findings'}`,
              `Changed files:\n${names || '- None'}`,
              `Link: ${pr.html_url}`,
            ].join('\n'));

            if (verdict === 'PASS') {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['automerge'] });
            } else {
              core.setFailed(`Review blocked: ${reasons.join('; ') || summary || 'manual review required'}`);
            }

      - name: Send Telegram review summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.review.outputs.telegram_message }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          msg = os.environ.get('MESSAGE', '').strip()
          if not msg:
              raise SystemExit(0)
          url = f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage"
          payload = json.dumps({'chat_id': os.environ['TELEGRAM_CHAT_ID'], 'text': msg}).encode()
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          PY
