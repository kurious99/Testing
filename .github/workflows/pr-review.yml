name: PR review gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze changed files and comment
        id: review
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number, per_page: 100
            });

            const count = files.length;
            const additions = files.reduce((a, f) => a + (f.additions || 0), 0);
            const deletions = files.reduce((a, f) => a + (f.deletions || 0), 0);
            const names = files.map(f => `- ${f.filename}`).join('\n');

            const sensitivePatterns = [/^\.github\//, /^package(-lock)?\.json$/, /^pnpm-lock\.yaml$/, /^yarn\.lock$/, /^Dockerfile$/, /^infra\//, /^scripts\//];
            const sensitive = files.filter(f => sensitivePatterns.some(r => r.test(f.filename))).map(f => f.filename);

            let verdict = 'PASS';
            let reasons = [];
            let findings = [];

            if (count > 20) {
              verdict = 'MANUAL_REVIEW';
              reasons.push(`Changed files too many: ${count}`);
            }
            if ((additions + deletions) > 400) {
              verdict = 'MANUAL_REVIEW';
              reasons.push(`Diff too large: +${additions}/-${deletions}`);
            }
            if (sensitive.length) {
              verdict = 'MANUAL_REVIEW';
              reasons.push(`Sensitive files changed: ${sensitive.join(', ')}`);
            }

            for (const f of files) {
              if (!f.filename.endsWith('.cs')) continue;
              const patch = f.patch || '';
              if (!patch) continue;

              if (/\+\s*return\s+\d+\s*;/.test(patch)) {
                verdict = 'REQUEST_CHANGES';
                reasons.push(`Suspicious numeric return in ${f.filename}`);
                findings.push(`${f.filename}: method appears to return a numeric literal directly; likely wrong return type or placeholder logic.`);
              }
              if (/\+.*throw\s+new\s+NotImplementedException\s*\(/.test(patch)) {
                verdict = 'REQUEST_CHANGES';
                reasons.push(`NotImplementedException introduced in ${f.filename}`);
                findings.push(`${f.filename}: new NotImplementedException introduced.`);
              }
              if (/\+.*ToUpper\(\)/.test(patch) && !/StringComparison/.test(patch)) {
                findings.push(`${f.filename}: check whether culture-sensitive casing is intended.`);
              }
              if (/\+.*name\./.test(patch) && !/string\.IsNullOrWhiteSpace\(name\)/.test(patch) && !/name\s*\?\./.test(patch)) {
                findings.push(`${f.filename}: possible null-handling issue if name can be null.`);
              }
            }

            const body = [
              '## Automated PR review',
              '',
              `**Verdict:** ${verdict}`,
              `**Files changed:** ${count}`,
              `**Diff size:** +${additions} / -${deletions}`,
              '',
              reasons.length ? `**Reasons:**\n${reasons.map(r => `- ${r}`).join('\n')}` : '**Reasons:**\n- No blocking policy issues detected',
              '',
              findings.length ? `**Findings:**\n${findings.map(f => `- ${f}`).join('\n')}` : '**Findings:**\n- No notable code-review findings',
              '',
              '**Changed files:**',
              names || '- None'
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });

            core.setOutput('telegram_message', [
              `${verdict === 'PASS' ? '🤖' : '⚠️'} PR #${pull_number} auto review: ${verdict}`,
              `Title: ${context.payload.pull_request.title}`,
              `Files changed: ${count}`,
              `Diff size: +${additions} / -${deletions}`,
              `Reasons: ${reasons.length ? reasons.join('; ') : 'No blocking policy issues detected'}`,
              `Findings: ${findings.length ? findings.join('; ') : 'No notable code-review findings'}`,
              `Changed files:\n${names || '- None'}`,
              `Link: ${context.payload.pull_request.html_url}`,
            ].join('\n'));

            if (verdict === 'PASS') {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['automerge'] });
            } else {
              core.setFailed(`Review blocked: ${reasons.join('; ') || 'manual review required'}`);
            }

      - name: Send Telegram review summary
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MESSAGE: ${{ steps.review.outputs.telegram_message }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          msg = os.environ.get('MESSAGE', '').strip()
          if not msg:
              raise SystemExit(0)
          url = f"https://api.telegram.org/bot{os.environ['TELEGRAM_BOT_TOKEN']}/sendMessage"
          payload = json.dumps({'chat_id': os.environ['TELEGRAM_CHAT_ID'], 'text': msg}).encode()
          req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
          with urllib.request.urlopen(req) as r:
              print(r.read().decode())
          PY
