name: PR review gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze changed files and comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = context.payload.pull_request.number;

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner, repo, pull_number, per_page: 100
            });

            const count = files.length;
            const additions = files.reduce((a, f) => a + (f.additions || 0), 0);
            const deletions = files.reduce((a, f) => a + (f.deletions || 0), 0);
            const names = files.map(f => `- \`${f.filename}\``).join('\n');

            const sensitivePatterns = [/^\.github\//, /^package(-lock)?\.json$/, /^pnpm-lock\.yaml$/, /^yarn\.lock$/, /^Dockerfile$/, /^infra\//, /^scripts\//];
            const sensitive = files.filter(f => sensitivePatterns.some(r => r.test(f.filename))).map(f => f.filename);

            let verdict = 'PASS';
            let reasons = [];

            if (count > 20) {
              verdict = 'MANUAL_REVIEW';
              reasons.push(`Changed files too many: ${count}`);
            }
            if ((additions + deletions) > 400) {
              verdict = 'MANUAL_REVIEW';
              reasons.push(`Diff too large: +${additions}/-${deletions}`);
            }
            if (sensitive.length) {
              verdict = 'MANUAL_REVIEW';
              reasons.push(`Sensitive files changed: ${sensitive.join(', ')}`);
            }

            const body = [
              '## Automated PR review',
              '',
              `**Verdict:** ${verdict}`,
              `**Files changed:** ${count}`,
              `**Diff size:** +${additions} / -${deletions}`,
              '',
              reasons.length ? `**Reasons:**\n${reasons.map(r => `- ${r}`).join('\n')}` : '**Reasons:**\n- No policy issues detected',
              '',
              '**Changed files:**',
              names || '- None'
            ].join('\n');

            await github.rest.issues.createComment({ owner, repo, issue_number: pull_number, body });

            if (verdict === 'PASS') {
              await github.rest.issues.addLabels({ owner, repo, issue_number: pull_number, labels: ['automerge'] });
            } else {
              core.setFailed(`Manual review required: ${reasons.join('; ') || 'policy gate failed'}`);
            }
